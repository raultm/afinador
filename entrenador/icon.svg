<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="96" fill="#9b59b6"/>
  <!-- pentagrama: 5 lineas -->
  <line x1="80" y1="200" x2="432" y2="200" stroke="white" stroke-width="14" stroke-linecap="round"/>
  <line x1="80" y1="240" x2="432" y2="240" stroke="white" stroke-width="14" stroke-linecap="round"/>
  <line x1="80" y1="280" x2="432" y2="280" stroke="white" stroke-width="14" stroke-linecap="round"/>
  <line x1="80" y1="320" x2="432" y2="320" stroke="white" stroke-width="14" stroke-linecap="round"/>
  <line x1="80" y1="360" x2="432" y2="360" stroke="white" stroke-width="14" stroke-linecap="round"/>
  <!-- nota negra en la tercera linea (y=280) -->
  <ellipse cx="260" cy="305" rx="38" ry="28" transform="rotate(-18 260 305)" fill="white"/>
  <line x1="294" y1="300" x2="294" y2="160" stroke="white" stroke-width="18" stroke-linecap="round"/>
</svg>
