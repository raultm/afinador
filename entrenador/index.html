<title>Entrenador</title>
<style>
  :root {
    --green:  #2ecc71;
    --yellow: #f1c40f;
    --red:    #e74c3c;
    --purple: #9b59b6;
    --bg:     #121212;
    --fg:     #f5f5f5;
  }
  * { box-sizing: border-box; }
  html { margin: 0; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
    background: var(--bg);
    color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  #app {
    width: 100%;
    max-width: 520px;
    text-align: center;
  }
  h1 {
    font-size: 1.1rem;
    font-weight: 500;
    color: #999;
    margin: 0 0 20px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  /* Tempo */
  #tempoBlock { margin-bottom: 20px; }
  .tempRow {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .tempBtn {
    font-size: 0.95rem;
    font-weight: 600;
    padding: 8px 12px;
    border-radius: 10px;
    border: none;
    background: #1a1a1a;
    color: var(--fg);
    cursor: pointer;
  }
  .tempBtn:active { opacity: 0.8; }
  #bpmDisplay {
    font-size: 1.8rem;
    font-weight: 700;
    min-width: 80px;

  #bpmDisplay .unit { font-size: 0.38em; font-weight: 500; color: #888; margin-left: 3px; }

    display: flex;
    justify-content: center;
    gap: 8px;
    margin-top: 10px;

    font-size: 0.85rem;
    font-weight: 600;
    padding: 6px 14px;
    border-radius: 999px;
    border: none;
    background: #1a1a1a;
    color: #aaa;
    cursor: pointer;

  .bpmPreset.active { background: var(--purple); color: #fff; }
  .bpmPreset:active { opacity: 0.8; }

    margin-top: 10px;
    font-size: 0.85rem;

    font-size: 0.9rem;
    margin-bottom: 8px;

    flex: 1;
    font-size: 0.85rem;
    padding: 9px 10px;
    border-radius: 10px;
    border: 1px solid #333;
    background: transparent;
    color: #aaa;
    cursor: pointer;

  .demoActionBtn:active { opacity: 0.7; }

  .mainBtn {
    font-size: 1.1rem;
    padding: 14px 28px;
    border-radius: 12px;
    border: none;
    font-weight: 600;
    cursor: pointer;

    font-weight: 700;

    margin-top: 4px;

    gap: 8px;
    margin-bottom: 24px;

    cursor: pointer;

    margin-top: 8px;

    font-size: 0.78rem;
    line-height: 1.6;

  table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
  th, td { padding: 7px 5px; text-align: center; border-bottom: 1px solid #2a2a2a; }

<script src="pitch.js"></script>
<script src="abcjs-basic-min.js"></script>
<script>
// ── Constantes de figuras rítmicas ──────────────────────────────────────────
// `penalty` es un coste de complejidad (en unidades log2) que se suma a la
// distancia al cuantizar: una figura con puntillo solo gana si encaja
// claramente mejor que la figura simple vecina. Evita el vaivén
// corchea ↔ corchea con puntillo con duraciones ambiguas.
const RHYTHM_VALUES = [
  { beats: 0.25, abc: '/4',  label: 'Semicorchea',      penalty: 0.12 },
  { beats: 0.5,  abc: '/2',  label: 'Corchea',          penalty: 0 },
  { beats: 0.75, abc: '3/4', label: 'Corchea puntillo', penalty: 0.2 },
  { beats: 1,    abc: '',    label: 'Negra',            penalty: 0 },
  { beats: 1.5,  abc: '3/2', label: 'Negra puntillo',   penalty: 0.2 },
  { beats: 2,    abc: '2',   label: 'Blanca',           penalty: 0 },
  { beats: 3,    abc: '3',   label: 'Blanca puntillo',  penalty: 0.2 },
  { beats: 4,    abc: '4',   label: 'Redonda',          penalty: 0.1 },
];

// Accidentales en ABC: cromático con sostenidos (^ = sostenido, ninguna = natural)
const ABC_BASE = ['C','^C','D','^D','E','F','^F','G','^G','A','^A','B'];

// Cuantiza en espacio logarítmico (ratios, no diferencias absolutas: la
// distancia absoluta sesga hacia las figuras largas) + penalización de complejidad.
// `dottedExtra`: penalización adicional a los puntillos para notas cuya
// duración es poco fiable (p.ej. la última de la toma).
function quantizeBeats(beats, dottedExtra = 0) {
  let best = RHYTHM_VALUES[0], bestCost = Infinity;
  for (const rv of RHYTHM_VALUES) {
    const dotted = rv.beats === 0.75 || rv.beats === 1.5 || rv.beats === 3;
    const cost = Math.abs(Math.log2(beats / rv.beats)) + rv.penalty + (dotted ? dottedExtra : 0);
    if (cost < bestCost) { bestCost = cost; best = rv; }
  }
  return best;
}

function inferRhythm(durationMs, bpm) {
  return quantizeBeats(durationMs / (60000 / bpm));
}

// Duración rítmica efectiva: intervalo entre ataques (IOI) en vez de duración
// sonada. Un músico respira o liga menos entre notas y todas quedan "cortas"
// de forma irregular; el IOI es mucho más estable. Si el hueco hasta la
// siguiente nota es grande (>35% del IOI) se asume silencio real y se usa la
// duración sonada.
function effectiveDurationMs(i) {
  const n = history[i], next = history[i + 1];
  if (!next || next.startTime === undefined) return n.durationMs;
  const ioi = next.startTime - n.startTime;
  const gap = ioi - n.durationMs;
  return (gap < ioi * 0.35) ? ioi : n.durationMs;
}

// Duraciones efectivas de toda la toma. La última nota no tiene "siguiente"
// (no hay IOI), así que su duración sonada se compensa con el factor de
// articulación mediano del resto: si el músico toca staccato al 70%, la
// última nota también estará al ~70% de su valor real.
function effectiveDurations() {
  const out = history.map((_, i) => effectiveDurationMs(i));
  if (history.length >= 3) {
    const ratios = [];
    for (let i = 0; i < history.length - 1; i++) {
      const ioi = history[i + 1].startTime - history[i].startTime;
      if (ioi > 0) ratios.push(Math.min(1, history[i].durationMs / ioi));
    }
    ratios.sort((a, b) => a - b);
    const f = ratios[Math.floor(ratios.length / 2)];
    if (f > 0.3) out[out.length - 1] = history[history.length - 1].durationMs / f;
  }
  return out;
}

// Re-infiere figuras con el bpm actual.
// Se llama tras la grabación y cada vez que el usuario cambia el BPM.
// (La antigua "normalización por contexto" se eliminó: con la cuantización
// log + penalización hacía más mal que bien — absorbía los puntillos reales.)
function recomputeRhythms() {
  const durs = effectiveDurations();
  history.forEach((n, i) => {
    n.effMs  = durs[i];
    const isLast = i === history.length - 1;
    n.rhythm = quantizeBeats(n.effMs / (60000 / bpm), isLast ? 0.15 : 0);
  });
  applyPairCompletion();
}

// Corrección por parejas: si dos notas adyacentes suman ~un valor simple
// (medio beat, un beat, dos beats) pero sus figuras cuantizadas no lo suman,
// se re-reparte la pareja. Caso típico: "corchea puntillo + semicorchea"
// tocada de forma imperfecta sale como "negra + semicorchea" (suma 1.25)
// aunque los ataques digan claramente que ocupan un solo beat.
function applyPairCompletion() {
  const beatMs = 60000 / bpm;
  // La última pareja se excluye: la duración de la nota final es poco fiable
  // (no tiene IOI) y contaminaría la suma.
  for (let i = 0; i < history.length - 2; i++) {
    const a = history[i], b = history[i + 1];
    const sumBeats = (a.effMs + b.effMs) / beatMs;
    const target = [0.5, 1, 2].find((t) => Math.abs(Math.log2(sumBeats / t)) < 0.12);
    if (!target || a.rhythm.beats + b.rhythm.beats === target) continue;
    let best = null, bestCost = Infinity;
    for (const ra of RHYTHM_VALUES) {
      for (const rb of RHYTHM_VALUES) {
        if (ra.beats + rb.beats !== target) continue;
        const cost = Math.abs(Math.log2(a.effMs / beatMs / ra.beats)) + ra.penalty
                   + Math.abs(Math.log2(b.effMs / beatMs / rb.beats)) + rb.penalty;
        if (cost < bestCost) { bestCost = cost; best = [ra, rb]; }
      }
    }
    // La pareja que completa el valor simple gana con ventaja de 0.15:
    // solo se corrige si la alternativa es razonablemente cercana.
    const curCost = Math.abs(Math.log2(a.effMs / beatMs / a.rhythm.beats)) + a.rhythm.penalty
                  + Math.abs(Math.log2(b.effMs / beatMs / b.rhythm.beats)) + b.rhythm.penalty
                  + 0.15;
    if (best && bestCost < curCost) { a.rhythm = best[0]; b.rhythm = best[1]; i++; }
  }
}

// Estimación de tempo por búsqueda de rejilla: elige el BPM que minimiza el
// error medio de cuantización de todas las duraciones efectivas. Mucho más
// robusto que "la nota más corta es una corchea". La ambigüedad de octava
// (60 vs 120 bpm) la rompen las propias penalizaciones de figuras: el tempo
// doblado necesita blancas puntillo/redondas donde el correcto usa figuras
// simples. El prior suave hacia tempos medios solo desempata casos exactos.
function estimateTempo() {
  if (history.length < 3) return bpm;
  const durs = effectiveDurations();
  let bestBpm = bpm, bestErr = Infinity;
  for (let cand = 40; cand <= 200; cand++) {
    const beatMs = 60000 / cand;
    let err = 0;
    for (const d of durs) {
      const beats = d / beatMs;
      const q = quantizeBeats(beats);
      err += Math.abs(Math.log2(beats / q.beats)) + q.penalty;
    }
    err = err / durs.length + Math.abs(Math.log2(cand / 100)) * 0.015;
    if (err < bestErr) { bestErr = err; bestBpm = cand; }
  }
  // Refinado: ajusta el beat con el residuo MEDIANO respecto a las figuras
  // cuantizadas y re-cuantiza. Baja el error de BPM del ±4% de la rejilla
  // entera a <2%. Mediana y no media: una nota mal cuantizada deja un residuo
  // enorme que con la media arrastraría el tempo justo en la dirección errónea.
  let beatMs = 60000 / bestBpm;
  for (let it = 0; it < 3; it++) {
    const res = durs.map((d) => {
      const q = quantizeBeats(d / beatMs);
      return Math.log2(d / (q.beats * beatMs));
    }).sort((a, b) => a - b);
    beatMs *= Math.pow(2, res[Math.floor(res.length / 2)]);
  }
  return Math.min(240, Math.max(30, Math.round(60000 / beatMs)));
}

function midiToAbcPitch(midi) {
  const idx = ((midi % 12) + 12) % 12;
  const octave = Math.floor(midi / 12) - 1;
  const base = ABC_BASE[idx];
  const isSharp = base.startsWith('^');
  const plain = isSharp ? base[1] : base;
  let letterOct;
  if (octave >= 5) {
    letterOct = plain.toLowerCase() + "'".repeat(Math.max(0, octave - 5));
  } else {
    letterOct = plain + ','.repeat(Math.max(0, 4 - octave));
  }
  return { letterOct, isSharp };
}

function buildAbc(history, bpm) {
  if (!history.length) return '';
  let body = '';
  let beatsSinceBar = 0;
  let sharpState = {};

  history.forEach((n, i) => {
    if (beatsSinceBar >= 4) {
      body += '| ';
      beatsSinceBar = 0;
      sharpState = {};
    }
    const { letterOct, isSharp } = midiToAbcPitch(n.midi);
    let acc = '';
    const prev = sharpState[letterOct];
    if (isSharp && prev !== true) acc = '^';
    else if (!isSharp && prev === true) acc = '=';
    sharpState[letterOct] = isSharp;

    beatsSinceBar += n.rhythm.beats;

    // Agrupa corcheas/semicorcheas adyacentes (beam) salvo en frontera de tiempo
    const next = history[i + 1];
    const beam = n.rhythm.beats < 1
      && next && next.rhythm.beats < 1
      && !Number.isInteger(beatsSinceBar);

    body += acc + letterOct + n.rhythm.abc + (beam ? '' : ' ');
  });

  body += '|]';
  return `X:1\nT:Entrenador\nM:4/4\nL:1/4\nQ:1/4=${bpm}\nK:C\n${body}\n`;
}

// ── Estado ───────────────────────────────────────────────────────────────────
let bpm = 90;
let audioContext, analyser, stream;
let running = false;
let history = [];

// Umbrales por TIEMPO, no por frames: requestAnimationFrame va de 30 a 120 fps
// según dispositivo, y con frames los umbrales cambiaban de móvil a móvil.
const NOTE_CONFIRM_MS      = 60;  // cambio de nota: debe sostenerse 60 ms
const JUMP_CONFIRM_MS      = 130; // saltos > octava: típicos errores de autocorrelación
const SILENCE_GRACE_MS     = 60;  // silencio sostenido antes de cerrar la nota
const MIN_NOTE_DURATION_MS = 80;  // < 80 ms se considera ruido/transitorio
const ATTACK_SKIP_MS       = 60;  // el ataque sesga la afinación: se ignora al medir
const REJOIN_GAP_MS        = 50;  // misma nota separada por hueco < 50 ms → microcorte, fusionar
const SMOOTHING_FACTOR     = 0.2; // suavizado EMA para la visualización en vivo

let displayedMidi = null, candidateMidi = null, candidateSince = 0;
let lastVoiceTime = 0, noteStartTime = 0, pitchSamples = [];
let smoothedCents = 0;
// Detección de re-ataque por energía (notas repetidas sin silencio apreciable)
let notePeakRms = 0, energyDip = false, dipTime = 0, dipMinRms = 0;

const buf = new Float32Array(2048);

// ── Referencias DOM ──────────────────────────────────────────────────────────
const bpmNumEl     = document.getElementById('bpmNum');
const bpmPresets   = document.querySelectorAll('.bpmPreset');
const detectBtn    = document.getElementById('detectBtn');
const startBtn     = document.getElementById('startBtn');
const stopBtn      = document.getElementById('stopBtn');
const resetBtn     = document.getElementById('resetBtn');
const liveEl       = document.getElementById('live');
const noteLetterEl = document.getElementById('noteLetter');
const noteOctaveEl = document.getElementById('noteOctave');
const liveInfoEl   = document.getElementById('liveInfo');
const resultsWrapEl= document.getElementById('resultsWrap');
const statCountEl  = document.getElementById('statCount');
const statDurationEl=document.getElementById('statDuration');
const statAccuracyEl=document.getElementById('statAccuracy');
const paperEl      = document.getElementById('paper');
const scoreEmptyEl = document.getElementById('scoreEmpty');
const abcTextEl    = document.getElementById('abcText');
const historyBodyEl= document.getElementById('historyBody');
const statusEl     = document.getElementById('status');
const demoBlockEl  = document.getElementById('demoBlock');
const demoSelect   = document.getElementById('demoSelect');
const demoBtn      = document.getElementById('demoBtn');
const fileBtn      = document.getElementById('fileBtn');
const audioFileEl  = document.getElementById('audioFile');

// ── Tempo ────────────────────────────────────────────────────────────────────
function setBpm(value) {
  bpm = Math.min(240, Math.max(30, Math.round(value)));
  bpmNumEl.textContent = bpm;
  bpmPresets.forEach((btn) => btn.classList.toggle('active', Number(btn.dataset.bpm) === bpm));
  if (history.length) { recomputeRhythms(); renderScore(); renderTable(); }
}

document.querySelectorAll('.tempBtn').forEach((btn) => {
  btn.addEventListener('click', () => setBpm(bpm + Number(btn.dataset.delta)));
});
bpmPresets.forEach((btn) => btn.addEventListener('click', () => setBpm(Number(btn.dataset.bpm))));
setBpm(bpm);

detectBtn.addEventListener('click', () => {
  if (!history.length) return;
  setBpm(estimateTempo());
});

// ── Grabación ────────────────────────────────────────────────────────────────
startBtn.addEventListener('click', startPractice);
stopBtn.addEventListener('click', stopPractice);
resetBtn.addEventListener('click', resetPractice);

async function startPractice() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    audioContext = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioContext.createAnalyser();
    analyser.fftSize = 2048;
    audioContext.createMediaStreamSource(stream).connect(analyser);

    resetDetectionState();
    lastVoiceTime = performance.now();

    startBtn.hidden = true;
    demoBlockEl.hidden = true;
    stopBtn.hidden  = false;
    liveEl.hidden   = false;
    resultsWrapEl.hidden = true;
    detectBtn.hidden = true;
    statusEl.textContent = '';
    running = true;
    requestAnimationFrame(update);
  } catch (err) {
    statusEl.textContent = 'No se ha podido acceder al micrófono: ' + err.name + ' — ' + err.message;
  }
}

function stopPractice() {
  running = false;
  closeCurrentNote();
  if (stream) stream.getTracks().forEach((t) => t.stop());
  if (audioContext) audioContext.close();

  stopBtn.hidden  = true;
  liveEl.hidden   = true;
  startBtn.hidden = true;
  demoBlockEl.hidden = false;
  finishAnalysis();
}

function resetDetectionState() {
  history = [];
  displayedMidi = null; candidateMidi = null; candidateSince = 0;
  pitchSamples = []; lastVoiceTime = 0;
}

// Post-proceso común a grabación en vivo, demos y archivos de audio
function finishAnalysis() {
  if (history.length >= 4) removeOutliers();
  mergeConsecutive();
  if (history.length >= 3) bpm = estimateTempo(); // tempo automático sobre lo analizado
  setBpm(bpm); // refresca UI y recalcula figuras con el tempo estimado
  detectBtn.hidden = !history.length;
  resultsWrapEl.hidden = false;
  renderResults();
}

function removeOutliers() {
  const midis = history.map((n) => n.midi).sort((a, b) => a - b);
  const q1 = midis[Math.floor(midis.length * 0.25)];
  const q3 = midis[Math.floor(midis.length * 0.75)];
  const iqr = q3 - q1;
  const lo  = q1 - 1.5 * iqr;
  const hi  = q3 + 1.5 * iqr;
  history = history.filter((n) => n.midi >= lo && n.midi <= hi);
}

function mergeConsecutive() {
  const merged = [];
  for (const n of history) {
    const last = merged[merged.length - 1];
    // Solo fusiona si el hueco es un microcorte: dos notas repetidas de verdad
    // (staccato, mismo tono dos veces, o ataque detectado por energía)
    // deben quedarse como dos notas.
    if (last && !last.keepSeparate && last.midi === n.midi
        && n.startTime - last.endTime < REJOIN_GAP_MS) {
      const total = last.durationMs + n.durationMs;
      last.cents      = Math.round((last.cents * last.durationMs + n.cents * n.durationMs) / total);
      last.durationMs = total;
      last.endTime    = n.endTime;
      last.rhythm     = inferRhythm(total, bpm);
    } else {
      merged.push({ ...n });
    }
  }
  history = merged;
}

function resetPractice() {
  history = [];
  detectBtn.hidden = true;
  resultsWrapEl.hidden = true;
  startBtn.hidden = false;
  demoBlockEl.hidden = false;
  statusEl.textContent = '';
}

// ── Demos y análisis de archivo ──────────────────────────────────────────────
// Cada demo se SINTETIZA como audio real y pasa por el pipeline completo
// (autocorrelación incluida), así prueba lo mismo que una grabación de verdad.
// `gap` = fracción del intervalo entre notas que queda en silencio (articulación).
const DEMOS = [
  {
    name: 'Escala Do mayor · negras · 90 bpm',
    bpm: 90, gap: 0.1,
    notes: [[60,1],[62,1],[64,1],[65,1],[67,1],[69,1],[71,1],[72,2]],
  },
  {
    name: 'Cumpleaños feliz · puntillos · 100 bpm',
    bpm: 100, gap: 0.12,
    notes: [[67,0.75],[67,0.25],[69,1],[67,1],[72,1],[71,2],
            [67,0.75],[67,0.25],[69,1],[67,1],[74,1],[72,2]],
  },
  {
    name: 'Notas repetidas · staccato · 90 bpm',
    bpm: 90, gap: 0.3,
    notes: [[67,0.5],[67,0.5],[67,0.5],[67,0.5],[69,0.5],[69,0.5],[69,0.5],[69,0.5],
            [67,1],[67,1],[65,2]],
  },
  {
    name: 'Ritmo mixto · 75 bpm',
    bpm: 75, gap: 0.1,
    notes: [[60,1],[62,0.5],[64,0.5],[65,1.5],[67,0.5],[69,1],[67,1],
            [65,0.5],[64,0.5],[62,0.5],[60,0.5],[60,2]],
  },
];

DEMOS.forEach((d, i) => {
  const opt = document.createElement('option');
  opt.value = i;
  opt.textContent = d.name;
  demoSelect.appendChild(opt);
});

// Sintetiza la demo con humanización: ±6% de timing y ±8 cents de afinación
// por nota, para que el test se parezca a un músico y no a un secuenciador.
async function synthesizeDemo(demo) {
  const sr = 44100;
  const beatS = 60 / demo.bpm;
  const totalS = demo.notes.reduce((s, n) => s + n[1], 0) * beatS + 1;
  const ctx = new OfflineAudioContext(1, Math.ceil(totalS * sr), sr);
  // Timbre con armónicos (más realista que una senoide pura para la autocorrelación)
  const wave = ctx.createPeriodicWave(
    new Float32Array([0, 0, 0, 0, 0]),
    new Float32Array([0, 1, 0.4, 0.2, 0.08]),
  );
  let t = 0.2;
  for (const [midi, beats] of demo.notes) {
    const ioi = beats * beatS * (0.94 + Math.random() * 0.12);
    // Articulación: mínimo 60 ms de separación (como el tonguing real)
    const silenceS = Math.max(0.06, ioi * demo.gap);
    const soundS = Math.max(0.05, ioi - silenceS);
    const osc = ctx.createOscillator();
    osc.setPeriodicWave(wave);
    osc.frequency.value = 440 * Math.pow(2, (midi - 69) / 12);
    osc.detune.value = Math.random() * 16 - 8;
    const g = ctx.createGain();
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(0.5, t + 0.015);
    g.gain.setValueAtTime(0.5, t + Math.max(0.02, soundS - 0.04));
    g.gain.linearRampToValueAtTime(0, t + soundS);
    osc.connect(g).connect(ctx.destination);
    osc.start(t);
    osc.stop(t + soundS + 0.01);
    t += ioi;
  }
  return ctx.startRendering();
}

// Pasa un AudioBuffer (demo sintetizada o archivo del usuario) por el mismo
// pipeline que la grabación en vivo, con tiempos derivados de las muestras.
async function analyzeAudioBuffer(audioBuf) {
  const sr = audioBuf.sampleRate;
  const len = Math.min(audioBuf.length, sr * 90); // límite 90 s
  const data = new Float32Array(len);
  for (let ch = 0; ch < audioBuf.numberOfChannels; ch++) {
    const d = audioBuf.getChannelData(ch);
    for (let i = 0; i < len; i++) data[i] += d[i] / audioBuf.numberOfChannels;
  }
  let peak = 0;
  for (let i = 0; i < len; i++) peak = Math.max(peak, Math.abs(data[i]));
  if (peak > 0.001) { const k = 0.9 / peak; for (let i = 0; i < len; i++) data[i] *= k; }

  statusEl.textContent = 'Analizando…';
  resetDetectionState();
  const win = new Float32Array(2048);
  const hop = Math.round(sr * 0.016); // ~16 ms, como un frame a 60 fps
  let frame = 0;
  for (let pos = 0; pos + 2048 <= len; pos += hop, frame++) {
    win.set(data.subarray(pos, pos + 2048));
    processFrame(autoCorrelate(win, sr), rmsOf(win), (pos / sr) * 1000);
    if (frame % 120 === 0) await new Promise((r) => setTimeout(r)); // no bloquear la UI
  }
  closeCurrentNote(lastVoiceTime || (len / sr) * 1000);

  statusEl.textContent = '';
  startBtn.hidden = true;
  liveEl.hidden = true;
  finishAnalysis();
}

demoBtn.addEventListener('click', async () => {
  const demo = DEMOS[Number(demoSelect.value)];
  if (!demo) return;
  try {
    statusEl.textContent = 'Generando demo…';
    demoBtn.disabled = true;
    await analyzeAudioBuffer(await synthesizeDemo(demo));
  } catch (err) {
    statusEl.textContent = 'Error en la demo: ' + err.message;
  } finally {
    demoBtn.disabled = false;
  }
});

fileBtn.addEventListener('click', () => audioFileEl.click());
audioFileEl.addEventListener('change', async () => {
  const file = audioFileEl.files[0];
  if (!file) return;
  try {
    statusEl.textContent = 'Decodificando audio…';
    fileBtn.disabled = true;
    const ac = new (window.AudioContext || window.webkitAudioContext)();
    const audioBuf = await ac.decodeAudioData(await file.arrayBuffer());
    ac.close();
    await analyzeAudioBuffer(audioBuf);
  } catch (err) {
    statusEl.textContent = 'No se ha podido analizar el audio: ' + err.message;
  } finally {
    fileBtn.disabled = false;
    audioFileEl.value = '';
  }
});

// ── Bucle de detección ───────────────────────────────────────────────────────
function rmsOf(b) {
  let s = 0;
  for (let i = 0; i < b.length; i++) s += b[i] * b[i];
  return Math.sqrt(s / b.length);
}

// Máquina de estados nota a nota, independiente de la fuente de audio:
// la usan tanto el micrófono en vivo como el análisis offline de demos/archivos.
// Devuelve true si hay sonido con pitch detectado.
function processFrame(pitch, rms, now) {
  if (pitch > 0) {
    lastVoiceTime = now;
    const midi = noteFromPitch(pitch);
    if (displayedMidi === null) {
      beginNote(midi, pitch, now, rms);
    } else if (midi !== displayedMidi) {
      if (midi === candidateMidi) {
        const requiredMs = Math.abs(midi - displayedMidi) > 12
          ? JUMP_CONFIRM_MS : NOTE_CONFIRM_MS;
        if (now - candidateSince >= requiredMs) {
          // La nueva nota empezó realmente cuando apareció el candidato
          closeCurrentNote(candidateSince);
          beginNote(midi, pitch, candidateSince, rms);
        }
      } else { candidateMidi = midi; candidateSince = now; }
    } else {
      candidateMidi = null;
      // Muestra la altura REAL (midi flotante), no solo los cents: la mediana
      // de estas muestras decide la nota final, robusta frente a la
      // variabilidad frame a frame.
      pitchSamples.push({ t: now, m: 12 * Math.log2(pitch / 440) + 69 });

      // Re-ataque por energía: la misma nota tocada otra vez casi ligada no
      // pasa por silencio, pero sí deja una caída profunda de energía seguida
      // de una subida rápida. Sin esto, dos negras repetidas = una blanca.
      if (rms > notePeakRms) notePeakRms = rms;
      if (!energyDip) {
        if (rms < notePeakRms * 0.3) { energyDip = true; dipTime = now; dipMinRms = rms; }
      } else if (rms < dipMinRms) {
        dipMinRms = rms;
      } else if (rms > dipMinRms * 2.5 && rms > notePeakRms * 0.4) {
        closeCurrentNote(dipTime, true); // true: no re-fusionar, es un ataque real
        beginNote(midi, pitch, now, rms);
      }
    }
    return true;
  }
  if (now - lastVoiceTime > SILENCE_GRACE_MS) {
    // La nota terminó cuando dejó de sonar, no tras el periodo de gracia
    closeCurrentNote(lastVoiceTime);
  }
  return false;
}

function update() {
  if (!running) return;
  analyser.getFloatTimeDomainData(buf);
  const pitch = autoCorrelate(buf, audioContext.sampleRate);
  const now = performance.now();

  if (processFrame(pitch, rmsOf(buf), now)) {
    const rawCents = centsOffFromPitch(pitch, displayedMidi);
    smoothedCents += (rawCents - smoothedCents) * SMOOTHING_FACTOR;
    renderLive(getNoteParts(displayedMidi), pitch, Math.round(smoothedCents));
  } else if (displayedMidi === null) {
    renderLiveSilence();
  }
  requestAnimationFrame(update);
}

function beginNote(midi, pitch, now, rms = 0) {
  displayedMidi = midi; candidateMidi = null;
  noteStartTime = now;
  smoothedCents = centsOffFromPitch(pitch, midi);
  pitchSamples = [{ t: now, m: 12 * Math.log2(pitch / 440) + 69 }];
  notePeakRms = rms; energyDip = false; dipMinRms = 0;
}

function closeCurrentNote(endTime = performance.now(), isRealOnsetSplit = false) {
  if (displayedMidi === null) return;
  const durationMs = endTime - noteStartTime;
  if (durationMs >= MIN_NOTE_DURATION_MS && pitchSamples.length) {
    // La nota final es la MEDIANA de todas las muestras de pitch, ignorando
    // el ataque: el primer frame (que antes fijaba la nota) es el más
    // inestable de todos.
    let samples = pitchSamples.filter((s) => s.t - noteStartTime >= ATTACK_SKIP_MS);
    if (samples.length < 3) samples = pitchSamples;
    const sorted = samples.map((s) => s.m).sort((a, b) => a - b);
    const mid = Math.floor(sorted.length / 2);
    const medianMidi = sorted.length % 2 !== 0
      ? sorted[mid]
      : (sorted[mid - 1] + sorted[mid]) / 2;
    const midi  = Math.round(medianMidi);
    const cents = Math.round((medianMidi - midi) * 100);

    const last = history[history.length - 1];
    if (last && !last.keepSeparate && last.midi === midi
        && noteStartTime - last.endTime < REJOIN_GAP_MS) {
      // Misma nota interrumpida por un microcorte: fusionar
      const total = last.durationMs + durationMs;
      last.cents = Math.round((last.cents * last.durationMs + cents * durationMs) / total);
      last.durationMs = total;
      last.endTime = endTime;
      last.rhythm = inferRhythm(total, bpm);
    } else {
      history.push({
        midi, cents, durationMs,
        startTime: noteStartTime, endTime,
        keepSeparate: isRealOnsetSplit, // ataque real detectado: nunca re-fusionar
        rhythm: inferRhythm(durationMs, bpm),
      });
    }
    if (isRealOnsetSplit && history.length) history[history.length - 1].keepSeparate = true;
  }
  displayedMidi = null; candidateMidi = null; pitchSamples = [];
}

// ── Render en vivo ───────────────────────────────────────────────────────────
function renderLive(noteParts, freq, cents) {
  noteLetterEl.textContent = noteParts.name;
  noteOctaveEl.textContent = noteParts.octave;
  const abs = Math.abs(cents);
  const color = abs <= 5 ? 'var(--green)' : abs <= 15 ? 'var(--yellow)' : 'var(--red)';
  noteLetterEl.style.color = color;
  liveInfoEl.textContent = freq.toFixed(1) + ' Hz · ' + (cents > 0 ? '+' : '') + cents + ' cents';
}
function renderLiveSilence() {
  noteLetterEl.textContent = '—';
  noteLetterEl.style.color = 'var(--fg)';
  noteOctaveEl.textContent = '';
  liveInfoEl.innerHTML = '&nbsp;';
}

// ── Render resultados ────────────────────────────────────────────────────────
function renderResults() {
  const totalS    = history.reduce((s, n) => s + n.durationMs, 0) / 1000;
  const inTune    = history.filter((n) => Math.abs(n.cents) <= 5).length;
  const accuracy  = history.length ? Math.round(inTune / history.length * 100) : 0;

  statCountEl.textContent    = history.length;
  statDurationEl.textContent = totalS.toFixed(1) + 's';
  statAccuracyEl.textContent = accuracy + '%';

  renderScore();
  renderTable();
}

function renderScore() {
  paperEl.innerHTML = '';
  if (!history.length) { scoreEmptyEl.hidden = false; abcTextEl.value = ''; return; }
  scoreEmptyEl.hidden = true;
  const abcStr = buildAbc(history, bpm);
  abcTextEl.value = abcStr;
  ABCJS.renderAbc('paper', abcStr, { responsive: 'resize' });
}

abcTextEl.addEventListener('input', () => {
  const txt = abcTextEl.value.trim();
  if (!txt) return;
  paperEl.innerHTML = '';
  scoreEmptyEl.hidden = true;
  ABCJS.renderAbc('paper', abcTextEl.value, { responsive: 'resize' });
});

function renderTable() {
  historyBodyEl.innerHTML = '';
  history.forEach((note, i) => {
    const parts = getNoteParts(note.midi);
    const abs   = Math.abs(note.cents);
    const color = abs <= 5 ? 'var(--green)' : abs <= 15 ? 'var(--yellow)' : 'var(--red)';
    const tr    = document.createElement('tr');
    tr.innerHTML =
      '<td>' + (i + 1) + '</td>' +
      '<td>' + parts.name + '<sup style="font-size:.7em;color:#888">' + parts.octave + '</sup></td>' +
      '<td>' + note.rhythm.label + '</td>' +
      '<td style="color:' + color + '">' + (note.cents > 0 ? '+' : '') + note.cents + '</td>';
    historyBodyEl.appendChild(tr);
  });
}

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('sw.js'));
}
