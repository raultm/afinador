<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Entrenador">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#121212">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="manifest" href="manifest.json">
<title>Entrenador</title>
<style>
  :root {
    --green:  #2ecc71;
    --yellow: #f1c40f;
    --red:    #e74c3c;
    --purple: #9b59b6;
    --bg:     #121212;
    --fg:     #f5f5f5;
  }
  * { box-sizing: border-box; }
  html { margin: 0; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
    background: var(--bg);
    color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  #app {
    width: 100%;
    max-width: 520px;
    text-align: center;
  }
  h1 {
    font-size: 1.1rem;
    font-weight: 500;
    color: #999;
    margin: 0 0 20px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  /* Tempo */
  #tempoBlock { margin-bottom: 20px; }
  .tempRow {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .tempBtn {
    font-size: 0.95rem;
    font-weight: 600;
    padding: 8px 12px;
    border-radius: 10px;
    border: none;
    background: #1a1a1a;
    color: var(--fg);
    cursor: pointer;
  }
  .tempBtn:active { opacity: 0.8; }
  #bpmDisplay {
    font-size: 1.8rem;
    font-weight: 700;
    min-width: 80px;
  }
  #bpmDisplay .unit { font-size: 0.38em; font-weight: 500; color: #888; margin-left: 3px; }
  .bpmPresets {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-top: 10px;
  }
  .bpmPreset {
    font-size: 0.85rem;
    font-weight: 600;
    padding: 6px 14px;
    border-radius: 999px;
    border: none;
    background: #1a1a1a;
    color: #aaa;
    cursor: pointer;
  }
  .bpmPreset.active { background: var(--purple); color: #fff; }
  .bpmPreset:active { opacity: 0.8; }
  #detectBtn {
    margin-top: 10px;
    font-size: 0.85rem;
    padding: 7px 16px;
    border-radius: 8px;
    border: 1px solid #333;
    background: transparent;
    color: #999;
    cursor: pointer;
  }
  #detectBtn:active { opacity: 0.7; }
  #detectBtn[hidden] { display: none; }

  /* Controls */
  #controls { margin-bottom: 20px; }
  .mainBtn {
    font-size: 1.1rem;
    padding: 14px 28px;
    border-radius: 12px;
    border: none;
    font-weight: 600;
    cursor: pointer;
  }
  .mainBtn:active { opacity: 0.8; }
  #startBtn { background: var(--purple); color: #fff; }
  #stopBtn  { background: var(--red); color: #400; }
  #resetBtn { background: #333; color: var(--fg); margin-top: 16px; }
  [hidden] { display: none !important; }

  /* Live */
  #live { margin-bottom: 24px; }
  #noteName {
    font-size: clamp(3rem, 16vw, 4rem);
    font-weight: 700;
    line-height: 1;
  }
  #noteOctave {
    font-size: 0.35em;
    font-weight: 500;
    vertical-align: super;
    margin-left: 0.1em;
    color: #888;
  }
  #liveInfo {
    font-size: 1rem;
    color: #aaa;
    margin-top: 4px;
    min-height: 1.4em;
  }

  /* Summary */
  #summary {
    display: flex;
    gap: 8px;
    margin-bottom: 24px;
  }
  .stat {
    flex: 1;
    background: #1a1a1a;
    border-radius: 12px;
    padding: 12px 4px;
  }
  .statValue { font-size: 1.4rem; font-weight: 700; }
  .statLabel { font-size: 0.75rem; color: #888; text-transform: uppercase; letter-spacing: 0.03em; margin-top: 2px; }

  /* Score */
  #scoreWrap {
    background: #fff;
    color: #000; /* fuerza negro en SVG que usa currentColor */
    border-radius: 12px;
    padding: 12px 8px 4px;
    margin-bottom: 16px;
    overflow-x: auto;
  }
  #scoreEmpty {
    color: #bbb;
    font-size: 0.9rem;
    padding: 24px 0;
  }

  /* Details collapsibles */
  details { margin-bottom: 16px; text-align: left; }
  details summary {
    font-size: 0.85rem;
    color: #777;
    cursor: pointer;
    user-select: none;
    padding: 6px 0;
    list-style: none;
  }
  details summary::-webkit-details-marker { display: none; }
  details summary::before { content: '▶  '; font-size: 0.65rem; }
  details[open] summary::before { content: '▼  '; font-size: 0.65rem; }

  /* ABC textarea */
  #abcText {
    width: 100%;
    min-height: 110px;
    margin-top: 8px;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #2a2a2a;
    background: #1a1a1a;
    color: var(--fg);
    font-family: monospace;
    font-size: 0.78rem;
    line-height: 1.6;
    resize: vertical;
  }

  /* Table */
  .tableWrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
  th, td { padding: 7px 5px; text-align: center; border-bottom: 1px solid #2a2a2a; }
  th { color: #888; font-weight: 500; font-size: 0.78rem; text-transform: uppercase; }

  #status { margin-top: 20px; font-size: 0.9rem; color: #e67e22; min-height: 1.4em; }
</style>
</head>
<body>
  <div id="app">
    <h1>Entrenador</h1>

    <!-- Tempo -->
    <div id="tempoBlock">
      <div class="tempRow">
        <button class="tempBtn" data-delta="-5">-5</button>
        <button class="tempBtn" data-delta="-1">-1</button>
        <div id="bpmDisplay"><span id="bpmNum">90</span><span class="unit">bpm</span></div>
        <button class="tempBtn" data-delta="1">+1</button>
        <button class="tempBtn" data-delta="5">+5</button>
      </div>
      <div class="bpmPresets">
        <button class="bpmPreset" data-bpm="60">60</button>
        <button class="bpmPreset" data-bpm="75">75</button>
        <button class="bpmPreset" data-bpm="90">90</button>
        <button class="bpmPreset" data-bpm="120">120</button>
      </div>
      <button id="detectBtn" hidden>↺ Detectar tempo (aprox.)</button>
    </div>

    <!-- Botones play/stop -->
    <div id="controls">
      <button id="startBtn" class="mainBtn">▶ Grabar</button>
      <button id="stopBtn"  class="mainBtn" hidden>■ Parar</button>
    </div>

    <!-- Nota en vivo -->
    <div id="live" hidden>
      <div id="noteName"><span id="noteLetter">—</span><span id="noteOctave"></span></div>
      <div id="liveInfo">&nbsp;</div>
    </div>

    <!-- Resultados -->
    <div id="resultsWrap" hidden>
      <!-- Stats -->
      <div id="summary">
        <div class="stat"><div class="statValue" id="statCount">0</div><div class="statLabel">Notas</div></div>
        <div class="stat"><div class="statValue" id="statDuration">0s</div><div class="statLabel">Duración</div></div>
        <div class="stat"><div class="statValue" id="statAccuracy">0%</div><div class="statLabel">Afinadas</div></div>
      </div>

      <!-- Partitura -->
      <div id="scoreWrap">
        <div id="scoreEmpty">Sin notas registradas.</div>
        <div id="paper"></div>
      </div>

      <!-- ABC editable -->
      <details id="abcDetails">
        <summary>Notación ABC</summary>
        <textarea id="abcText" spellcheck="false"></textarea>
      </details>

      <!-- Tabla detalle -->
      <details id="historyDetails">
        <summary>Detalle de notas</summary>
        <div class="tableWrap">
          <table>
            <thead>
              <tr><th>#</th><th>Nota</th><th>Figura</th><th>Desv.</th></tr>
            </thead>
            <tbody id="historyBody"></tbody>
          </table>
        </div>
      </details>

      <button id="resetBtn" class="mainBtn">Nueva grabación</button>
    </div>

    <p id="status"></p>
  </div>

<script src="pitch.js"></script>
<script src="abcjs-basic-min.js"></script>
<script>
// ── Constantes de figuras rítmicas ──────────────────────────────────────────
const RHYTHM_VALUES = [
  { beats: 0.25, abc: '/4',  label: 'Semicorchea' },
  { beats: 0.5,  abc: '/2',  label: 'Corchea' },
  { beats: 0.75, abc: '3/4', label: 'Corchea puntillo' },
  { beats: 1,    abc: '',    label: 'Negra' },
  { beats: 1.5,  abc: '3/2', label: 'Negra puntillo' },
  { beats: 2,    abc: '2',   label: 'Blanca' },
  { beats: 3,    abc: '3',   label: 'Blanca puntillo' },
  { beats: 4,    abc: '4',   label: 'Redonda' },
];

// Accidentales en ABC: cromático con sostenidos (^ = sostenido, ninguna = natural)
const ABC_BASE = ['C','^C','D','^D','E','F','^F','G','^G','A','^A','B'];

function inferRhythm(durationMs, bpm) {
  const beatMs = 60000 / bpm;
  const beats = durationMs / beatMs;
  let closest = RHYTHM_VALUES[0];
  let minDiff = Infinity;
  for (const rv of RHYTHM_VALUES) {
    const diff = Math.abs(rv.beats - beats);
    if (diff < minDiff) { minDiff = diff; closest = rv; }
  }
  return closest;
}

// Re-infiere figuras con el bpm actual y normaliza por contexto.
// Se llama tras la grabación y cada vez que el usuario cambia el BPM.
function recomputeRhythms() {
  history.forEach((n) => { n.rhythm = inferRhythm(n.durationMs, bpm); });
  applyContextNormalization();
}

// La figura más frecuente "atrae" las notas adyacentes dentro del ±40%
// (corchea tocada un 15% larga → sigue siendo corchea si el contexto lo dice).
function applyContextNormalization() {
  if (history.length < 3) return;
  const freq = {};
  history.forEach((n) => { freq[n.rhythm.beats] = (freq[n.rhythm.beats] || 0) + 1; });
  const domBeats  = Number(Object.entries(freq).sort((a, b) => b[1] - a[1])[0][0]);
  const domRhythm = RHYTHM_VALUES.find((rv) => rv.beats === domBeats);
  if (!domRhythm) return;
  const tolerance = domBeats * 0.4;
  const beatMs    = 60000 / bpm;
  history.forEach((n) => {
    if (n.rhythm.beats === domBeats) return;
    if (Math.abs(n.durationMs / beatMs - domBeats) <= tolerance) n.rhythm = domRhythm;
  });
}

function midiToAbcPitch(midi) {
  const idx = ((midi % 12) + 12) % 12;
  const octave = Math.floor(midi / 12) - 1;
  const base = ABC_BASE[idx];
  const isSharp = base.startsWith('^');
  const plain = isSharp ? base[1] : base;
  let letterOct;
  if (octave >= 5) {
    letterOct = plain.toLowerCase() + "'".repeat(Math.max(0, octave - 5));
  } else {
    letterOct = plain + ','.repeat(Math.max(0, 4 - octave));
  }
  return { letterOct, isSharp };
}

function buildAbc(history, bpm) {
  if (!history.length) return '';
  let body = '';
  let beatsSinceBar = 0;
  let sharpState = {};

  history.forEach((n, i) => {
    if (beatsSinceBar >= 4) {
      body += '| ';
      beatsSinceBar = 0;
      sharpState = {};
    }
    const { letterOct, isSharp } = midiToAbcPitch(n.midi);
    let acc = '';
    const prev = sharpState[letterOct];
    if (isSharp && prev !== true) acc = '^';
    else if (!isSharp && prev === true) acc = '=';
    sharpState[letterOct] = isSharp;

    beatsSinceBar += n.rhythm.beats;

    // Agrupa corcheas/semicorcheas adyacentes (beam) salvo en frontera de tiempo
    const next = history[i + 1];
    const beam = n.rhythm.beats < 1
      && next && next.rhythm.beats < 1
      && !Number.isInteger(beatsSinceBar);

    body += acc + letterOct + n.rhythm.abc + (beam ? '' : ' ');
  });

  body += '|]';
  return `X:1\nT:Entrenador\nM:4/4\nL:1/4\nQ:1/4=${bpm}\nK:C\n${body}\n`;
}

// ── Estado ───────────────────────────────────────────────────────────────────
let bpm = 90;
let audioContext, analyser, stream;
let running = false;
let history = [];

const NOTE_CONFIRM_FRAMES  = 4;
const JUMP_CONFIRM_FRAMES  = 8;  // saltos > octava: más frames para filtrar errores de autocorrelación
const SILENCE_GRACE_FRAMES = 8;
const MIN_NOTE_DURATION_MS = 150; // < 150 ms se considera ruido/transitorio
const SMOOTHING_FACTOR     = 0.2; // suavizado EMA para la visualización en vivo

let displayedMidi = null, candidateMidi = null, candidateCount = 0;
let silenceFrames = 0, noteStartTime = 0, centsSamples = [];
let smoothedCents = 0;

const buf = new Float32Array(2048);

// ── Referencias DOM ──────────────────────────────────────────────────────────
const bpmNumEl     = document.getElementById('bpmNum');
const bpmPresets   = document.querySelectorAll('.bpmPreset');
const detectBtn    = document.getElementById('detectBtn');
const startBtn     = document.getElementById('startBtn');
const stopBtn      = document.getElementById('stopBtn');
const resetBtn     = document.getElementById('resetBtn');
const liveEl       = document.getElementById('live');
const noteLetterEl = document.getElementById('noteLetter');
const noteOctaveEl = document.getElementById('noteOctave');
const liveInfoEl   = document.getElementById('liveInfo');
const resultsWrapEl= document.getElementById('resultsWrap');
const statCountEl  = document.getElementById('statCount');
const statDurationEl=document.getElementById('statDuration');
const statAccuracyEl=document.getElementById('statAccuracy');
const paperEl      = document.getElementById('paper');
const scoreEmptyEl = document.getElementById('scoreEmpty');
const abcTextEl    = document.getElementById('abcText');
const historyBodyEl= document.getElementById('historyBody');
const statusEl     = document.getElementById('status');

// ── Tempo ────────────────────────────────────────────────────────────────────
function setBpm(value) {
  bpm = Math.min(240, Math.max(30, Math.round(value)));
  bpmNumEl.textContent = bpm;
  bpmPresets.forEach((btn) => btn.classList.toggle('active', Number(btn.dataset.bpm) === bpm));
  if (history.length) { recomputeRhythms(); renderScore(); renderTable(); }
}

document.querySelectorAll('.tempBtn').forEach((btn) => {
  btn.addEventListener('click', () => setBpm(bpm + Number(btn.dataset.delta)));
});
bpmPresets.forEach((btn) => btn.addEventListener('click', () => setBpm(Number(btn.dataset.bpm))));
setBpm(bpm);

// Detección aproximada de tempo: nota más corta ≈ corchea (0.5 beat)
detectBtn.addEventListener('click', () => {
  if (!history.length) return;
  const minMs = Math.min(...history.map((n) => n.durationMs));
  setBpm(Math.round(30000 / minMs)); // 60000ms/bpm * 0.5beats = minMs → bpm = 30000/minMs
});

// ── Grabación ────────────────────────────────────────────────────────────────
startBtn.addEventListener('click', startPractice);
stopBtn.addEventListener('click', stopPractice);
resetBtn.addEventListener('click', resetPractice);

async function startPractice() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    audioContext = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioContext.createAnalyser();
    analyser.fftSize = 2048;
    audioContext.createMediaStreamSource(stream).connect(analyser);

    history = [];
    displayedMidi = null; candidateMidi = null; candidateCount = 0;
    silenceFrames = 0; centsSamples = [];

    startBtn.hidden = true;
    stopBtn.hidden  = false;
    liveEl.hidden   = false;
    resultsWrapEl.hidden = true;
    detectBtn.hidden = true;
    statusEl.textContent = '';
    running = true;
    requestAnimationFrame(update);
  } catch (err) {
    statusEl.textContent = 'No se ha podido acceder al micrófono: ' + err.name + ' — ' + err.message;
  }
}

function stopPractice() {
  running = false;
  closeCurrentNote();
  if (stream) stream.getTracks().forEach((t) => t.stop());
  if (audioContext) audioContext.close();

  if (history.length >= 4) removeOutliers();
  mergeConsecutive();
  recomputeRhythms();

  stopBtn.hidden  = true;
  liveEl.hidden   = true;
  startBtn.hidden = true;
  detectBtn.hidden = !history.length;
  resultsWrapEl.hidden = false;
  renderResults();
}

function removeOutliers() {
  const midis = history.map((n) => n.midi).sort((a, b) => a - b);
  const q1 = midis[Math.floor(midis.length * 0.25)];
  const q3 = midis[Math.floor(midis.length * 0.75)];
  const iqr = q3 - q1;
  const lo  = q1 - 1.5 * iqr;
  const hi  = q3 + 1.5 * iqr;
  history = history.filter((n) => n.midi >= lo && n.midi <= hi);
}

function mergeConsecutive() {
  const merged = [];
  for (const n of history) {
    const last = merged[merged.length - 1];
    if (last && last.midi === n.midi) {
      const total = last.durationMs + n.durationMs;
      last.cents      = Math.round((last.cents * last.durationMs + n.cents * n.durationMs) / total);
      last.durationMs = total;
      last.rhythm     = inferRhythm(total, bpm);
    } else {
      merged.push({ ...n });
    }
  }
  history = merged;
}

function resetPractice() {
  history = [];
  detectBtn.hidden = true;
  resultsWrapEl.hidden = true;
  startBtn.hidden = false;
  statusEl.textContent = '';
}

// ── Bucle de detección ───────────────────────────────────────────────────────
function update() {
  if (!running) return;
  analyser.getFloatTimeDomainData(buf);
  const pitch = autoCorrelate(buf, audioContext.sampleRate);

  if (pitch > 0) {
    silenceFrames = 0;
    const midi = noteFromPitch(pitch);
    if (displayedMidi === null) {
      beginNote(midi, pitch);
    } else if (midi !== displayedMidi) {
      if (midi === candidateMidi) {
        candidateCount++;
        const required = Math.abs(midi - displayedMidi) > 12
          ? JUMP_CONFIRM_FRAMES : NOTE_CONFIRM_FRAMES;
        if (candidateCount >= required) { closeCurrentNote(); beginNote(midi, pitch); }
      } else { candidateMidi = midi; candidateCount = 1; }
    } else {
      candidateCount = 0;
      centsSamples.push(centsOffFromPitch(pitch, displayedMidi));
    }
    const rawCents = centsOffFromPitch(pitch, displayedMidi);
    smoothedCents += (rawCents - smoothedCents) * SMOOTHING_FACTOR;
    renderLive(getNoteParts(displayedMidi), pitch, Math.round(smoothedCents));
  } else if (++silenceFrames > SILENCE_GRACE_FRAMES) {
    closeCurrentNote();
    renderLiveSilence();
  }
  requestAnimationFrame(update);
}

function beginNote(midi, pitch) {
  displayedMidi = midi; candidateMidi = null; candidateCount = 0;
  noteStartTime = performance.now();
  smoothedCents = centsOffFromPitch(pitch, midi);
  centsSamples = [centsOffFromPitch(pitch, midi)];
}

function closeCurrentNote() {
  if (displayedMidi === null) return;
  const durationMs = performance.now() - noteStartTime;
  if (durationMs >= MIN_NOTE_DURATION_MS && centsSamples.length) {
    // Mediana en vez de media: ignora los transitorios del ataque/caída que
    // sesgan la media aunque la nota sea estable.
    const sorted = [...centsSamples].sort((a, b) => a - b);
    const mid = Math.floor(sorted.length / 2);
    const avgCents = sorted.length % 2 !== 0
      ? sorted[mid]
      : Math.round((sorted[mid - 1] + sorted[mid]) / 2);
    const last = history[history.length - 1];
    if (last && last.midi === displayedMidi) {
      // Misma nota interrumpida por ruido o silencio breve: fusionar
      const total = last.durationMs + durationMs;
      last.cents = Math.round((last.cents * last.durationMs + avgCents * durationMs) / total);
      last.durationMs = total;
      last.rhythm = inferRhythm(total, bpm);
    } else {
      history.push({ midi: displayedMidi, durationMs, cents: avgCents, rhythm: inferRhythm(durationMs, bpm) });
    }
  }
  displayedMidi = null; candidateMidi = null; candidateCount = 0; centsSamples = [];
}

// ── Render en vivo ───────────────────────────────────────────────────────────
function renderLive(noteParts, freq, cents) {
  noteLetterEl.textContent = noteParts.name;
  noteOctaveEl.textContent = noteParts.octave;
  const abs = Math.abs(cents);
  const color = abs <= 5 ? 'var(--green)' : abs <= 15 ? 'var(--yellow)' : 'var(--red)';
  noteLetterEl.style.color = color;
  liveInfoEl.textContent = freq.toFixed(1) + ' Hz · ' + (cents > 0 ? '+' : '') + cents + ' cents';
}
function renderLiveSilence() {
  noteLetterEl.textContent = '—';
  noteLetterEl.style.color = 'var(--fg)';
  noteOctaveEl.textContent = '';
  liveInfoEl.innerHTML = '&nbsp;';
}

// ── Render resultados ────────────────────────────────────────────────────────
function renderResults() {
  const totalS    = history.reduce((s, n) => s + n.durationMs, 0) / 1000;
  const inTune    = history.filter((n) => Math.abs(n.cents) <= 5).length;
  const accuracy  = history.length ? Math.round(inTune / history.length * 100) : 0;

  statCountEl.textContent    = history.length;
  statDurationEl.textContent = totalS.toFixed(1) + 's';
  statAccuracyEl.textContent = accuracy + '%';

  renderScore();
  renderTable();
}

function renderScore() {
  paperEl.innerHTML = '';
  if (!history.length) { scoreEmptyEl.hidden = false; abcTextEl.value = ''; return; }
  scoreEmptyEl.hidden = true;
  const abcStr = buildAbc(history, bpm);
  abcTextEl.value = abcStr;
  ABCJS.renderAbc('paper', abcStr, { responsive: 'resize' });
}

abcTextEl.addEventListener('input', () => {
  const txt = abcTextEl.value.trim();
  if (!txt) return;
  paperEl.innerHTML = '';
  scoreEmptyEl.hidden = true;
  ABCJS.renderAbc('paper', abcTextEl.value, { responsive: 'resize' });
});

function renderTable() {
  historyBodyEl.innerHTML = '';
  history.forEach((note, i) => {
    const parts = getNoteParts(note.midi);
    const abs   = Math.abs(note.cents);
    const color = abs <= 5 ? 'var(--green)' : abs <= 15 ? 'var(--yellow)' : 'var(--red)';
    const tr    = document.createElement('tr');
    tr.innerHTML =
      '<td>' + (i + 1) + '</td>' +
      '<td>' + parts.name + '<sup style="font-size:.7em;color:#888">' + parts.octave + '</sup></td>' +
      '<td>' + note.rhythm.label + '</td>' +
      '<td style="color:' + color + '">' + (note.cents > 0 ? '+' : '') + note.cents + '</td>';
    historyBodyEl.appendChild(tr);
  });
}

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('sw.js'));
}
</script>
</body>
</html>
