<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Metrónomo">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#121212">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="manifest" href="manifest.json">
<title>Metrónomo</title>
<style>
  :root {
    --green: #2ecc71;
    --yellow: #f1c40f;
    --red: #e74c3c;
    --bg: #121212;
    --fg: #f5f5f5;
  }
  * { box-sizing: border-box; }
  html { margin: 0; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
    background: var(--bg);
    color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  #app {
    width: 100%;
    max-width: 360px;
    text-align: center;
  }
  h1 {
    font-size: 1.1rem;
    font-weight: 500;
    color: #999;
    margin: 0 0 32px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  #beatDot {
    width: 90px;
    height: 90px;
    border-radius: 50%;
    background: #2a2a2a;
    margin: 0 auto 12px;
    transition: background 0.05s ease, transform 0.05s ease;
  }
  #beatDot.flash {
    background: var(--green);
    transform: scale(1.12);
  }
  #beatDot.flash.accent {
    background: var(--yellow);
  }
  #beatLabel {
    font-size: 1.1rem;
    color: #aaa;
    margin-bottom: 32px;
    min-height: 1.4em;
  }
  .control {
    margin-bottom: 24px;
    text-align: center;
  }
  .stepper {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }
  .stepValue {
    font-size: clamp(2.2rem, 13vw, 3rem);
    font-weight: 700;
    min-width: 90px;
  }
  .unit {
    font-size: 0.32em;
    font-weight: 500;
    color: #888;
    margin-left: 4px;
  }
  .stepBtn {
    font-size: 1rem;
    font-weight: 600;
    padding: 10px 14px;
    border-radius: 10px;
    border: none;
    background: #1a1a1a;
    color: var(--fg);
    cursor: pointer;
  }
  .stepBtn:active { opacity: 0.8; }
  .presets {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-top: 12px;
  }
  .presetBtn {
    font-size: 0.95rem;
    font-weight: 600;
    padding: 8px 18px;
    border-radius: 999px;
    border: none;
    background: #1a1a1a;
    color: #aaa;
    cursor: pointer;
  }
  .presetBtn.active {
    background: var(--green);
    color: #062;
  }
  .presetBtn:active { opacity: 0.8; }
  #playBtn {
    font-size: 1.2rem;
    padding: 16px 32px;
    border-radius: 12px;
    border: none;
    background: var(--green);
    color: #062;
    font-weight: 600;
    cursor: pointer;
    margin-top: 8px;
  }
  #playBtn.playing { background: var(--red); color: #400; }
  #playBtn:active { opacity: 0.8; }
</style>
</head>
<body>
  <div id="app">
    <h1>Metrónomo</h1>

    <div id="beatDot"></div>
    <div id="beatLabel">—</div>

    <div class="control" aria-label="BPM">
      <div class="stepper">
        <button class="stepBtn" data-action="bpm" data-delta="-5">-5</button>
        <button class="stepBtn" data-action="bpm" data-delta="-1">-1</button>
        <div id="bpmValue" class="stepValue"><span id="bpmNum">100</span><span class="unit">bpm</span></div>
        <button class="stepBtn" data-action="bpm" data-delta="1">+1</button>
        <button class="stepBtn" data-action="bpm" data-delta="5">+5</button>
      </div>
      <div class="presets">
        <button class="presetBtn" data-action="bpm" data-value="60">60</button>
        <button class="presetBtn" data-action="bpm" data-value="75">75</button>
        <button class="presetBtn" data-action="bpm" data-value="90">90</button>
        <button class="presetBtn" data-action="bpm" data-value="120">120</button>
      </div>
    </div>

    <div class="control" aria-label="Pulsos por compás">
      <div class="stepper">
        <button class="stepBtn" data-action="beats" data-delta="-1">-1</button>
        <div id="beatsValue" class="stepValue"><span id="beatsNum">4</span><span class="unit">pulsos</span></div>
        <button class="stepBtn" data-action="beats" data-delta="1">+1</button>
      </div>
    </div>

    <button id="playBtn">▶ Play</button>
  </div>

<script>
const beatDot = document.getElementById('beatDot');
const beatLabel = document.getElementById('beatLabel');
const bpmNumEl = document.getElementById('bpmNum');
const beatsNumEl = document.getElementById('beatsNum');
const playBtn = document.getElementById('playBtn');

let audioContext;
let isRunning = false;
let bpm = 100;
let beatsPerBar = 4;
let currentBeatInBar = 0;
let nextNoteTime = 0.0;
let notesInQueue = [];
let lastNoteDrawn = -1;
let timerID = null;

const LOOKAHEAD_MS = 25;
const SCHEDULE_AHEAD_S = 0.1;
const CLICK_DURATION_S = 0.05;

function setBpm(value) {
  bpm = Math.min(240, Math.max(30, value));
  bpmNumEl.textContent = bpm;
  document.querySelectorAll('.presetBtn[data-action="bpm"]').forEach((btn) => {
    btn.classList.toggle('active', Number(btn.dataset.value) === bpm);
  });
}

function setBeatsPerBar(value) {
  beatsPerBar = Math.min(12, Math.max(1, value));
  beatsNumEl.textContent = beatsPerBar;
  document.querySelectorAll('.presetBtn[data-action="beats"]').forEach((btn) => {
    btn.classList.toggle('active', Number(btn.dataset.value) === beatsPerBar);
  });
}

document.querySelectorAll('.stepBtn').forEach((btn) => {
  btn.addEventListener('click', () => {
    const delta = Number(btn.dataset.delta);
    if (btn.dataset.action === 'bpm') setBpm(bpm + delta);
    else setBeatsPerBar(beatsPerBar + delta);
  });
});

document.querySelectorAll('.presetBtn').forEach((btn) => {
  btn.addEventListener('click', () => {
    const value = Number(btn.dataset.value);
    if (btn.dataset.action === 'bpm') setBpm(value);
    else setBeatsPerBar(value);
  });
});

setBpm(bpm);
setBeatsPerBar(beatsPerBar);

playBtn.addEventListener('click', () => {
  if (!audioContext) {
    audioContext = new (window.AudioContext || window.webkitAudioContext)();
  }
  isRunning ? stopMetronome() : startMetronome();
});

function startMetronome() {
  isRunning = true;
  currentBeatInBar = 0;
  nextNoteTime = audioContext.currentTime + 0.05;
  notesInQueue = [];
  lastNoteDrawn = -1;
  playBtn.textContent = '■ Stop';
  playBtn.classList.add('playing');
  scheduler();
  requestAnimationFrame(draw);
}

function stopMetronome() {
  isRunning = false;
  clearTimeout(timerID);
  playBtn.textContent = '▶ Play';
  playBtn.classList.remove('playing');
  beatDot.classList.remove('flash', 'accent');
  beatLabel.textContent = '—';
}

function scheduler() {
  while (nextNoteTime < audioContext.currentTime + SCHEDULE_AHEAD_S) {
    scheduleClick(currentBeatInBar, nextNoteTime);
    nextNoteTime += 60.0 / bpm;
    currentBeatInBar = (currentBeatInBar + 1) % beatsPerBar;
  }
  timerID = setTimeout(scheduler, LOOKAHEAD_MS);
}

function scheduleClick(beatNumber, time) {
  const osc = audioContext.createOscillator();
  const gain = audioContext.createGain();
  osc.connect(gain);
  gain.connect(audioContext.destination);

  osc.frequency.value = beatNumber === 0 ? 1500 : 1000;
  gain.gain.setValueAtTime(1, time);
  gain.gain.exponentialRampToValueAtTime(0.001, time + CLICK_DURATION_S);

  osc.start(time);
  osc.stop(time + CLICK_DURATION_S);

  notesInQueue.push({ beatNumber, time });
}

function draw() {
  let drawnBeat = lastNoteDrawn;
  const currentTime = audioContext.currentTime;

  while (notesInQueue.length && notesInQueue[0].time < currentTime) {
    drawnBeat = notesInQueue[0].beatNumber;
    notesInQueue.shift();
  }

  if (lastNoteDrawn !== drawnBeat) {
    lastNoteDrawn = drawnBeat;
    flashBeat(drawnBeat);
  }

  if (isRunning) requestAnimationFrame(draw);
}

function flashBeat(beatNumber) {
  beatDot.classList.remove('flash', 'accent');
  void beatDot.offsetWidth;
  beatDot.classList.add('flash');
  if (beatNumber === 0) beatDot.classList.add('accent');
  beatLabel.textContent = (beatNumber + 1) + ' / ' + beatsPerBar;
  setTimeout(() => beatDot.classList.remove('flash', 'accent'), 100);
}

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('sw.js'));
}
</script>
</body>
</html>
