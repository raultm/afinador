<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Práctica">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#121212">
<title>Práctica</title>
<style>
  :root {
    --green: #2ecc71;
    --yellow: #f1c40f;
    --red: #e74c3c;
    --bg: #121212;
    --fg: #f5f5f5;
  }
  * { box-sizing: border-box; }
  html { margin: 0; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
    background: var(--bg);
    color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  #app {
    width: 100%;
    max-width: 480px;
    text-align: center;
  }
  h1 {
    font-size: 1.1rem;
    font-weight: 500;
    color: #999;
    margin: 0 0 24px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  #controls { margin-bottom: 24px; }
  button {
    font-size: 1.1rem;
    padding: 14px 28px;
    border-radius: 12px;
    border: none;
    font-weight: 600;
    cursor: pointer;
  }
  #startBtn { background: var(--green); color: #062; }
  #stopBtn { background: var(--red); color: #400; }
  #resetBtn { background: #333; color: var(--fg); margin-top: 16px; }
  button:active { opacity: 0.8; }
  [hidden] { display: none !important; }
  #live {
    margin-bottom: 32px;
  }
  #noteName {
    font-size: clamp(3rem, 16vw, 4rem);
    font-weight: 700;
    line-height: 1;
  }
  #noteOctave {
    font-size: 0.35em;
    font-weight: 500;
    vertical-align: super;
    margin-left: 0.1em;
    color: #888;
  }
  #liveInfo {
    font-size: 1rem;
    color: #aaa;
    margin-top: 4px;
    min-height: 1.4em;
  }
  #summary {
    display: flex;
    gap: 8px;
    margin-bottom: 24px;
  }
  .stat {
    flex: 1;
    background: #1a1a1a;
    border-radius: 12px;
    padding: 12px 4px;
  }
  .statValue {
    font-size: 1.4rem;
    font-weight: 700;
  }
  .statLabel {
    font-size: 0.75rem;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 0.03em;
    margin-top: 2px;
  }
  .tableWrap {
    overflow-x: auto;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.95rem;
  }
  th, td {
    padding: 8px 6px;
    text-align: center;
    border-bottom: 1px solid #2a2a2a;
  }
  th {
    color: #888;
    font-weight: 500;
    font-size: 0.8rem;
    text-transform: uppercase;
  }
  #historyWrap h2 {
    font-size: 1rem;
    color: #ccc;
    text-align: left;
    margin: 0 0 12px;
  }
  #status {
    margin-top: 24px;
    font-size: 0.9rem;
    color: #e67e22;
    min-height: 1.4em;
  }
</style>
</head>
<body>
  <div id="app">
    <h1>Registro de práctica</h1>

    <div id="controls">
      <button id="startBtn">▶ Play</button>
      <button id="stopBtn" hidden>■ Stop</button>
    </div>

    <div id="live" hidden>
      <div id="noteName"><span id="noteLetter">—</span><span id="noteOctave"></span></div>
      <div id="liveInfo">&nbsp;</div>
    </div>

    <div id="historyWrap" hidden>
      <div id="summary">
        <div class="stat"><div class="statValue" id="statCount">0</div><div class="statLabel">Notas</div></div>
        <div class="stat"><div class="statValue" id="statDuration">0s</div><div class="statLabel">Duración</div></div>
        <div class="stat"><div class="statValue" id="statAccuracy">0%</div><div class="statLabel">Afinadas</div></div>
      </div>
      <h2>Detalle de notas</h2>
      <div class="tableWrap">
        <table>
          <thead>
            <tr><th>#</th><th>Nota</th><th>Duración</th><th>Desviación</th></tr>
          </thead>
          <tbody id="historyBody"></tbody>
        </table>
      </div>
      <button id="resetBtn">Nueva grabación</button>
    </div>

    <p id="status"></p>
  </div>

<script src="pitch.js"></script>
<script>
const startBtn = document.getElementById('startBtn');
const stopBtn = document.getElementById('stopBtn');
const resetBtn = document.getElementById('resetBtn');
const liveEl = document.getElementById('live');
const noteLetterEl = document.getElementById('noteLetter');
const noteOctaveEl = document.getElementById('noteOctave');
const liveInfoEl = document.getElementById('liveInfo');
const historyWrapEl = document.getElementById('historyWrap');
const historyBodyEl = document.getElementById('historyBody');
const statCountEl = document.getElementById('statCount');
const statDurationEl = document.getElementById('statDuration');
const statAccuracyEl = document.getElementById('statAccuracy');
const statusEl = document.getElementById('status');

let audioContext, analyser, stream;
const buf = new Float32Array(2048);

const NOTE_CONFIRM_FRAMES = 4;
const SILENCE_GRACE_FRAMES = 8;
const MIN_NOTE_DURATION_MS = 80;

let displayedMidi = null;
let candidateMidi = null;
let candidateCount = 0;
let silenceFrames = 0;
let noteStartTime = 0;
let centsSamples = [];
let history = [];
let running = false;

startBtn.addEventListener('click', startPractice);
stopBtn.addEventListener('click', stopPractice);
resetBtn.addEventListener('click', resetPractice);

async function startPractice() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    audioContext = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioContext.createAnalyser();
    analyser.fftSize = 2048;
    const source = audioContext.createMediaStreamSource(stream);
    source.connect(analyser);

    history = [];
    displayedMidi = null;
    candidateMidi = null;
    candidateCount = 0;
    silenceFrames = 0;
    centsSamples = [];

    startBtn.hidden = true;
    stopBtn.hidden = false;
    liveEl.hidden = false;
    historyWrapEl.hidden = true;
    statusEl.textContent = '';
    running = true;
    requestAnimationFrame(update);
  } catch (err) {
    statusEl.textContent = 'No se ha podido acceder al micrófono: ' + err.name + ' — ' + err.message;
  }
}

function stopPractice() {
  running = false;
  closeCurrentNote();
  if (stream) stream.getTracks().forEach((t) => t.stop());
  if (audioContext) audioContext.close();

  stopBtn.hidden = true;
  liveEl.hidden = true;
  startBtn.hidden = true;
  historyWrapEl.hidden = false;
  renderHistory();
}

function resetPractice() {
  history = [];
  startBtn.hidden = false;
  historyWrapEl.hidden = true;
  statusEl.textContent = '';
}

function update() {
  if (!running) return;

  analyser.getFloatTimeDomainData(buf);
  const pitch = autoCorrelate(buf, audioContext.sampleRate);

  if (pitch > 0) {
    silenceFrames = 0;
    const midi = noteFromPitch(pitch);

    if (displayedMidi === null) {
      beginNote(midi, pitch);
    } else if (midi !== displayedMidi) {
      if (midi === candidateMidi) {
        candidateCount++;
        if (candidateCount >= NOTE_CONFIRM_FRAMES) {
          closeCurrentNote();
          beginNote(midi, pitch);
        }
      } else {
        candidateMidi = midi;
        candidateCount = 1;
      }
    } else {
      candidateCount = 0;
      centsSamples.push(centsOffFromPitch(pitch, displayedMidi));
    }

    renderLive(getNoteParts(displayedMidi), pitch, centsOffFromPitch(pitch, displayedMidi));
  } else if (++silenceFrames > SILENCE_GRACE_FRAMES) {
    closeCurrentNote();
    renderLiveSilence();
  }

  requestAnimationFrame(update);
}

function beginNote(midi, pitch) {
  displayedMidi = midi;
  candidateMidi = null;
  candidateCount = 0;
  noteStartTime = performance.now();
  centsSamples = [centsOffFromPitch(pitch, midi)];
}

function closeCurrentNote() {
  if (displayedMidi === null) return;
  const durationMs = performance.now() - noteStartTime;
  if (durationMs >= MIN_NOTE_DURATION_MS && centsSamples.length) {
    const avgCents = Math.round(centsSamples.reduce((a, b) => a + b, 0) / centsSamples.length);
    const parts = getNoteParts(displayedMidi);
    history.push({ name: parts.name + parts.octave, durationMs, cents: avgCents });
  }
  displayedMidi = null;
  candidateMidi = null;
  candidateCount = 0;
  centsSamples = [];
}

function renderLive(noteParts, freq, cents) {
  noteLetterEl.textContent = noteParts.name;
  noteOctaveEl.textContent = noteParts.octave;
  const abs = Math.abs(cents);
  const color = abs <= 5 ? 'var(--green)' : abs <= 15 ? 'var(--yellow)' : 'var(--red)';
  noteLetterEl.style.color = color;
  liveInfoEl.textContent = freq.toFixed(1) + ' Hz · ' + (cents > 0 ? '+' : '') + cents + ' cents';
}

function renderLiveSilence() {
  noteLetterEl.textContent = '—';
  noteLetterEl.style.color = 'var(--fg)';
  noteOctaveEl.textContent = '';
  liveInfoEl.innerHTML = '&nbsp;';
}

function renderHistory() {
  const totalDurationS = history.reduce((sum, n) => sum + n.durationMs, 0) / 1000;
  const inTuneCount = history.filter((n) => Math.abs(n.cents) <= 5).length;
  const accuracyPct = history.length ? Math.round((inTuneCount / history.length) * 100) : 0;

  statCountEl.textContent = history.length;
  statDurationEl.textContent = totalDurationS.toFixed(1) + 's';
  statAccuracyEl.textContent = accuracyPct + '%';

  historyBodyEl.innerHTML = '';
  history.forEach((note, i) => {
    const abs = Math.abs(note.cents);
    const color = abs <= 5 ? 'var(--green)' : abs <= 15 ? 'var(--yellow)' : 'var(--red)';
    const tr = document.createElement('tr');
    tr.innerHTML =
      '<td>' + (i + 1) + '</td>' +
      '<td>' + note.name + '</td>' +
      '<td>' + (note.durationMs / 1000).toFixed(2) + ' s</td>' +
      '<td style="color:' + color + '">' + (note.cents > 0 ? '+' : '') + note.cents + '</td>';
    historyBodyEl.appendChild(tr);
  });
}

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('sw.js'));
}
</script>
</body>
</html>
