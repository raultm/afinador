<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Actualizando…</title>
<style>
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #121212;
    color: #f5f5f5;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    text-align: center;
    padding: 16px;
  }
</style>
</head>
<body>
  <p id="msg">Actualizando…</p>
<script>
(async () => {
  const msg = document.getElementById('msg');
  try {
    // Solo toca lo que pertenece a este proyecto: registros de service worker cuyo
    // scope cubre esta misma carpeta, y cachés con el prefijo usado por sus sw.js.
    // No afecta a otros sitios alojados en el mismo dominio (p. ej. otro proyecto
    // en raultm.github.io/otro-repo/).
    const projectScope = new URL('.', location.href).href;

    if ('serviceWorker' in navigator) {
      const regs = await navigator.serviceWorker.getRegistrations();
      const mine = regs.filter((r) => projectScope.startsWith(r.scope));
      await Promise.all(mine.map((r) => r.unregister()));
    }

    if ('caches' in window) {
      const keys = await caches.keys();
      const mine = keys.filter((k) => /^(afinador|practica|metronomo)-/.test(k));
      await Promise.all(mine.map((k) => caches.delete(k)));
    }

    msg.textContent = 'Listo, redirigiendo…';
  } catch (err) {
    msg.textContent = 'No se pudo limpiar automáticamente: ' + err.message;
  }
  setTimeout(() => location.replace('./'), 600);
})();
</script>
</body>
</html>
